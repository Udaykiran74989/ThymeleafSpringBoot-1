<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{baseui :: mybaselayout(~{::section})}">

<body>

<section>

<div class="container mt-4">

    <h2>All Users</h2>

	<table class="table">
	    <thead>
	        <tr>
	            <th scope="col">Name</th>
	            <th scope="col">Email</th>
	            <th scope="col">Address</th>
	            <th scope="col">Aadhar</th>
	            <th scope="col">Pan</th>
	            <th scope="col">Action</th>
	        </tr>
	    </thead>

	    <tbody>
	        <tr th:each="u : ${userlist}">
	            <td th:text="${u.name}"></td>
	            <td th:text="${u.email}"></td>
	            <td th:text="${u.address}"></td>
	            <td th:text="${u.aadhar}"></td>
	            <td th:text="${u.pan}"></td>

	            <td>
	                <a class="btn btn-warning"
	                   th:href="@{'/edituser/' + ${u.id}}">
	                    Edit
	                </a>

	                <a class="btn btn-danger"th:href="@{'/delete/' + ${u.id}}">
	                    Delete
	                </a>
	            </td>
	        </tr>
	    </tbody>
	</table>
</div>

</section>

</body>

</html>
