<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{baseui :: mybaselayout(~{::section})}">

<body>

<section>

<div class="container mt-4">

    <h2>Edit User</h2>

    <form th:action="@{/update}" th:object="${user}" method="post">

       
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Name</label>
            <input type="text" class="form-control"
                   th:field="*{name}" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control"
                   th:field="*{email}" required>
        </div>

        <div class="mb-3">
            <label>Address</label>
            <input type="text" class="form-control"
                   th:field="*{address}" required>
        </div>

        <div class="mb-3">
            <label>Aadhar</label>
            <input type="text" class="form-control"
                   th:field="*{aadhar}" required>
        </div>

        <div class="mb-3">
            <label>PAN</label>
            <input type="text" class="form-control"
                   th:field="*{pan}" required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" class="form-control"
                   th:field="*{password}" required>
        </div>

        <button type="submit" class="btn btn-success">
            Update User
        </button>

        <a th:href="@{/allusers}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

</section>

</body>
</html>
